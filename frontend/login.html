<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-image: url("images/login_register_bg.png"); /* 确保图片在同一目录 */
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        .login-form {
            display: flex;
            flex-direction: column;
        }
        .login-form label {
            margin-bottom: 5px;
        }
        .login-form input {
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .login-form button {
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .login-form button:hover {
            background-color: #0056b3;
        }
        .toggle-link {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }
        .toggle-link a {
            color: #007BFF;
            text-decoration: none;
        }
        .toggle-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <!-- 移除了 action 和 method，改为由 JS 处理 -->
        <form class="login-form" id="loginForm">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Login</button>
        </form>
        <div class="toggle-link">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // 阻止表单默认提交行为

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const STORAGE_KEY = 'intelligent_switch_users';

            // 获取所有用户
            let users = [];
            if (localStorage.getItem(STORAGE_KEY)) {
                users = JSON.parse(localStorage.getItem(STORAGE_KEY));
            }

            // 1. 验证账户是否存在
            const user = users.find(u => u.username === username);
            
            if (!user) {
                alert('Account does not exist. Please register first.');
                return;
            }

            // 2. 简单密码验证 (模拟：实际项目中应由后端验证，这里假设只要账户存在且密码非空即通过，或者您可以约定初始密码)
            // 由于注册页未存储密码到 localStorage (出于安全考虑)，这里仅作非空检查或模拟验证
            if (!password) {
                alert('Please enter your password.');
                return;
            }
            
            // 模拟验证成功
            sessionStorage.setItem('currentUser', username);
            window.location.href = 'home.html';
        });
    </script>
</body>
</html>
